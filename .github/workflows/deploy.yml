name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  # ── Job 1: Run Tests ─────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: orphic_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DB_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/orphic_test
      OPENAI_API_KEY: "test-key-for-ci-only"
      GROQ_API_KEY: "test-key-for-ci-only"
      JWT_SECRET: "test-jwt-secret-for-ci-only"
      ENVIRONMENT: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── Job 2: Build and Push to ACR ─────────────────────────────────────────────
  build-and-push:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: orphicregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            orphicregistry.azurecr.io/orphic-backend:latest
            orphicregistry.azurecr.io/orphic-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Job 3: Deploy to Azure VM ─────────────────────────────────────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Azure VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_IP }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/orphic/app

            # Pull latest code
            git checkout main
            git pull origin main

            # Login to ACR
            docker login orphicregistry.azurecr.io \
              -u "${{ secrets.ACR_USERNAME }}" \
              -p "${{ secrets.ACR_PASSWORD }}"

            # Pull new image
            docker compose -f docker-compose.prod.yml pull

            # Restart with new image
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Verify app is healthy
            sleep 10
            curl -f http://127.0.0.1:8000/health || exit 1

            echo "Deployment successful"