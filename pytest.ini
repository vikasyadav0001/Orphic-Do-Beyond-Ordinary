# pytest.ini
# ==========
# Configuration for the Orphic test suite.
#
# Run all tests:        pytest
# Run only DB tests:    pytest -m db
# Run only auth tests:  pytest -m auth
# Run with coverage:    pytest --cov=. --cov-report=term-missing
# Verbose + stop on 1st fail: pytest -v -x
#
# Each layer (db / auth / orchestrator) runs in isolation:
#   - DB tests use a SQLite file in /tmp (no Postgres needed)
#   - Auth tests use the same SQLite but rely on fastapi-users behavior
#   - Orchestrator tests mock OpenAI/Groq at the module boundary
#
# Environment variables are set in conftest.py BEFORE app import, so
# you don't need a real .env file to run the suite locally.

[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Markers (also registered in conftest.py)
markers =
    db: Database integration tests
    auth: Authentication / authorization tests
    api: HTTP endpoint tests
    orchestrator: LangGraph agent / pipeline tests
    slow: long-running integration tests

# Show full traceback for failures (helps debugging CI failures)
addopts = -ra --tb=short --strict-markers

# Ignore these directories
norecursedirs = venv .git uploads __pycache__ .pytest_cache